services:
  manga-translator:
    image: zyddnys/manga-image-translator:main
    container_name: manga-translator
    ipc: host
    volumes:
      - ./result:/app/result
      - manga-translator-models:/app/models
      - manga-translator-upload:/app/upload
    env_file:
      - .env
    restart: unless-stopped
    # 상시 실행이 아닌, docker exec으로 local 모드 번역 실행
    entrypoint: ["tail", "-f", "/dev/null"]
    # GPU 사용 시 아래 주석 해제
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  manga-translator-models:
  manga-translator-upload:
